# JDT.LS Feature Extension Logging Configuration
# 
# This file controls logging behavior. You can:
# 1. Use this file in the classpath (bundled with plugin)
# 2. Override by placing logging.properties in ~/.jdtls-featureext/
#
# Configuration Properties:
# - featureext.logging.console.enabled: Enable/disable console logging (true/false)
# - featureext.logging.console.level: Console log level (OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL)
# - featureext.logging.file.enabled: Enable/disable file logging (true/false)
# - featureext.logging.file.level: File log level (OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL)
# - featureext.logging.file.size: Max file size in bytes (default: 10485760 = 10MB)
# - featureext.logging.file.count: Number of rotating log files (default: 5)

# ============================================================================
# CONSOLE LOGGING
# ============================================================================
# Enable console logging (true/false)
featureext.logging.console.enabled=true

# Console log level - shows this level and above
# Levels: OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL
featureext.logging.console.level=INFO

# ============================================================================
# FILE LOGGING
# ============================================================================
# Enable file logging (true/false)
featureext.logging.file.enabled=true

# File log level - logs this level and above
# Levels: OFF, SEVERE, WARNING, INFO, CONFIG, FINE, FINER, FINEST, ALL
featureext.logging.file.level=ALL

# Maximum log file size in bytes (10MB = 10485760)
featureext.logging.file.size=10485760

# Number of rotating log files to keep
featureext.logging.file.count=5

# ============================================================================
# COMMON CONFIGURATIONS
# ============================================================================

# Production Mode (minimal console, detailed file)
# featureext.logging.console.enabled=true
# featureext.logging.console.level=WARNING
# featureext.logging.file.enabled=true
# featureext.logging.file.level=INFO

# Debug Mode (verbose logging to both)
# featureext.logging.console.enabled=true
# featureext.logging.console.level=FINE
# featureext.logging.file.enabled=true
# featureext.logging.file.level=ALL

# Console Only (no file logging)
# featureext.logging.console.enabled=true
# featureext.logging.console.level=INFO
# featureext.logging.file.enabled=false

# File Only (no console logging)
# featureext.logging.console.enabled=false
# featureext.logging.file.enabled=true
# featureext.logging.file.level=ALL

# Disable All Logging
# featureext.logging.console.enabled=false
# featureext.logging.file.enabled=false

# ============================================================================
# Log file location: ~/.jdtls-featureext/logs/jdtls-featureext.log
# ============================================================================

